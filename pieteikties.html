<!DOCTYPE html>
<html lang="lv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pieteikties · Skaņu Darbnīca</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Raleway:ital,wght@0,300;0,400;0,600;0,800;1,300;1,600&display=swap&subset=latin,latin-ext" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#F5EDD8; --bg2:#EDE0C4; --bg3:#E3D0A8;
    --accent:#B8860B; --accent-light:#D4A843; --accent-dark:#7A5800;
    --text:#2A1F08; --muted:#7A6840; --border:rgba(120,90,20,0.18);
    --zala:#3B6D11; --sarkana:#9C3A22;
  }
  body{
    background:var(--bg); color:var(--text);
    font-family:'Raleway',sans-serif;
    -webkit-font-smoothing:antialiased;
    min-height:100vh;
    display:flex; align-items:center; justify-content:center;
    padding:36px 20px;
  }
  .karte{
    background:var(--bg2);
    border:0.5px solid var(--border);
    border-radius:16px;
    width:100%; max-width:440px;
    padding:44px 38px 38px;
  }
  .atpakal{
    display:inline-block;font-size:13px;color:var(--muted);
    text-decoration:none;margin-bottom:26px;font-weight:600;
  }
  .atpakal:hover{color:var(--accent-dark)}
  h1{
    font-family:Georgia,serif;font-weight:400;font-size:30px;
    line-height:1.2;margin-bottom:8px;
  }
  h1 em{font-style:italic;color:var(--accent-dark)}
  .ievads{font-size:13.5px;color:var(--muted);margin-bottom:28px;line-height:1.6}
  .celini{display:flex;gap:26px;border-bottom:0.5px solid var(--border);margin-bottom:26px}
  .celins{
    background:none;border:none;border-bottom:2px solid transparent;
    padding:0 0 12px;margin-bottom:-1px;
    font-family:inherit;font-size:13.5px;font-weight:600;
    color:var(--muted);cursor:pointer;
  }
  .celins[aria-selected="true"]{color:var(--text);border-bottom-color:var(--accent-dark)}
  label{
    display:block;font-size:11.5px;font-weight:600;letter-spacing:.09em;
    text-transform:uppercase;color:var(--muted);margin-bottom:8px;
  }
  .lauks{margin-bottom:17px}
  input{
    width:100%;padding:12px 14px;font-family:inherit;font-size:14.5px;
    color:var(--text);background:var(--bg);
    border:0.5px solid var(--border);border-radius:10px;
  }
  input:focus{outline:none;border-color:var(--accent);background:#FBF6E8}
  input::placeholder{color:#B3A57F}
  .poga{
    width:100%;padding:14px;font-family:inherit;font-size:14.5px;font-weight:600;
    color:var(--bg);background:var(--accent-dark);
    border:none;border-radius:100px;cursor:pointer;margin-top:8px;
  }
  .poga:hover{background:var(--accent)}
  .poga:disabled{opacity:.45;cursor:default}
  .poga-google{
    width:100%;padding:13px;font-family:inherit;font-size:14px;font-weight:600;
    color:var(--text);background:var(--bg);
    border:0.5px solid var(--border);border-radius:100px;cursor:pointer;
    display:flex;align-items:center;justify-content:center;gap:10px;
  }
  .poga-google:hover{border-color:var(--accent-dark)}
  .skirtne{
    display:flex;align-items:center;gap:14px;margin:22px 0;
    font-size:12px;color:var(--muted);
  }
  .skirtne::before,.skirtne::after{content:"";flex:1;height:0.5px;background:var(--border)}
  .zinojums{
    font-size:13.5px;line-height:1.55;padding:12px 14px;border-radius:10px;
    margin-bottom:20px;display:none;
  }
  .zinojums.kluda{display:block;background:#F4E2DC;color:var(--sarkana);border:0.5px solid rgba(156,58,34,.25)}
  .zinojums.labi{display:block;background:#E4EDD8;color:var(--zala);border:0.5px solid rgba(59,109,17,.25)}
  .aizmirsu{
    background:none;border:none;font-family:inherit;font-size:13px;
    color:var(--muted);text-decoration:underline;cursor:pointer;
    padding:0;margin-top:16px;display:block;
  }
  .aizmirsu:hover{color:var(--accent-dark)}
  .paslepts{display:none}
</style>
</head>
<body>

<main class="karte">
  <a class="atpakal" href="index.html">← Atpakaļ uz sākumu</a>

  <h1>Skaņu <em>Darbnīca</em></h1>
  <p class="ievads">Izveido kontu, lai pieteiktu bērnu nodarbībām un sekotu līdzi ierakstiem.</p>

  <div class="celini" role="tablist">
    <button class="celins" id="celinsPieteikties" role="tab" aria-selected="true">Pieteikties</button>
    <button class="celins" id="celinsRegistret" role="tab" aria-selected="false">Izveidot kontu</button>
  </div>

  <div class="zinojums" id="zinojums"></div>

  <form id="formaPieteikties">
    <div class="lauks">
      <label for="pEpasts">E-pasts</label>
      <input type="email" id="pEpasts" autocomplete="email" required>
    </div>
    <div class="lauks">
      <label for="pParole">Parole</label>
      <input type="password" id="pParole" autocomplete="current-password" required>
    </div>
    <button type="submit" class="poga" id="pogaPieteikties">Pieteikties</button>
    <button type="button" class="aizmirsu" id="pogaAizmirsu">Aizmirsi paroli?</button>
  </form>

  <form id="formaRegistret" class="paslepts">
    <div class="lauks">
      <label for="rVards">Vārds, uzvārds</label>
      <input type="text" id="rVards" autocomplete="name" placeholder="Emīls Bērziņš" required>
    </div>
    <div class="lauks">
      <label for="rEpasts">E-pasts</label>
      <input type="email" id="rEpasts" autocomplete="email" required>
    </div>
    <div class="lauks">
      <label for="rTelefons">Telefons</label>
      <input type="tel" id="rTelefons" autocomplete="tel" placeholder="+371 20 000 000">
    </div>
    <div class="lauks">
      <label for="rParole">Parole</label>
      <input type="password" id="rParole" autocomplete="new-password" minlength="6" placeholder="Vismaz 6 simboli" required>
    </div>
    <button type="submit" class="poga" id="pogaRegistret">Izveidot kontu</button>
  </form>

  <div class="skirtne">vai</div>

  <button type="button" class="poga-google" id="pogaGoogle">
    <svg width="17" height="17" viewBox="0 0 48 48" aria-hidden="true">
      <path fill="#4285F4" d="M45 24c0-1.6-.1-2.7-.4-4H24v7.5h12c-.2 2-1.5 5-4.4 7l6.7 5.2C42.2 36 45 30.6 45 24z"/>
      <path fill="#34A853" d="M24 46c5.9 0 10.9-2 14.5-5.3l-6.9-5.4c-1.9 1.3-4.3 2.2-7.6 2.2-5.8 0-10.7-3.8-12.5-9.1l-7.1 5.5C8.1 41 15.4 46 24 46z"/>
      <path fill="#FBBC05" d="M11.5 28.4c-.5-1.4-.7-2.9-.7-4.4s.3-3 .7-4.4l-7.1-5.5C2.9 17 2 20.4 2 24s.9 7 2.4 9.9l7.1-5.5z"/>
      <path fill="#EA4335" d="M24 10.5c4.1 0 6.9 1.8 8.5 3.3l6.2-6C34.9 4.3 29.9 2 24 2 15.4 2 8.1 7 4.4 14.1l7.1 5.5C13.3 14.3 18.2 10.5 24 10.5z"/>
    </svg>
    Turpināt ar Google
  </button>
</main>

<script type="module">
import {
  auth, registret, pieteikties, pieteiktiesArGoogle,
  atjaunotParoli, kludasTeksts, onAuthStateChanged
} from './js/firebase-init.js';

const zinojums = document.getElementById('zinojums');
const formaPieteikties = document.getElementById('formaPieteikties');
const formaRegistret = document.getElementById('formaRegistret');
const celinsPieteikties = document.getElementById('celinsPieteikties');
const celinsRegistret = document.getElementById('celinsRegistret');

function paradit(teksts, veids = 'kluda') {
  zinojums.textContent = teksts;
  zinojums.className = 'zinojums ' + veids;
}
function notirit() { zinojums.className = 'zinojums'; }

onAuthStateChanged(auth, (user) => {
  if (user) window.location.href = 'profils.html';
});

celinsPieteikties.onclick = () => {
  celinsPieteikties.setAttribute('aria-selected','true');
  celinsRegistret.setAttribute('aria-selected','false');
  formaPieteikties.classList.remove('paslepts');
  formaRegistret.classList.add('paslepts');
  notirit();
};
celinsRegistret.onclick = () => {
  celinsRegistret.setAttribute('aria-selected','true');
  celinsPieteikties.setAttribute('aria-selected','false');
  formaRegistret.classList.remove('paslepts');
  formaPieteikties.classList.add('paslepts');
  notirit();
};

formaPieteikties.onsubmit = async (e) => {
  e.preventDefault();
  const poga = document.getElementById('pogaPieteikties');
  poga.disabled = true; poga.textContent = 'Piesakās…';
  try {
    await pieteikties(pEpasts.value.trim(), pParole.value);
    window.location.href = 'profils.html';
  } catch (err) {
    paradit(kludasTeksts(err));
    poga.disabled = false; poga.textContent = 'Pieteikties';
  }
};

formaRegistret.onsubmit = async (e) => {
  e.preventDefault();
  const poga = document.getElementById('pogaRegistret');
  poga.disabled = true; poga.textContent = 'Veido kontu…';
  try {
    await registret({
      epasts: rEpasts.value.trim(),
      parole: rParole.value,
      vards: rVards.value.trim(),
      telefons: rTelefons.value.trim(),
    });
    window.location.href = 'profils.html';
  } catch (err) {
    paradit(kludasTeksts(err));
    poga.disabled = false; poga.textContent = 'Izveidot kontu';
  }
};

document.getElementById('pogaGoogle').onclick = async () => {
  try {
    await pieteiktiesArGoogle();
    window.location.href = 'profils.html';
  } catch (err) {
    paradit(kludasTeksts(err));
  }
};

document.getElementById('pogaAizmirsu').onclick = async () => {
  const epasts = pEpasts.value.trim();
  if (!epasts) {
    paradit('Ieraksti e-pastu laukā augšā, tad spied vēlreiz.');
    return;
  }
  try {
    await atjaunotParoli(epasts);
    paradit('Nosūtījām saiti paroles nomaiņai uz ' + epasts, 'labi');
  } catch (err) {
    paradit(kludasTeksts(err));
  }
};
</script>
</body>
</html>
